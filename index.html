<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>UML Редактор (Mermaid -> Draw.io)</title>
    <link rel="stylesheet" href="style.css">
    <script src="script.js" defer></script>
</head>
<body>
    <header>
        <h1>Импорт Mermaid в Draw.io</h1>
    </header>
    
    <main class="container">
        <section class="editor-pane">
            <h3 style="margin-bottom: 10px;">1. Вставьте Mermaid код:</h3>
            <textarea id="editor" spellcheck="false"></textarea>
            <button id="importBtn" class="btn" style="margin-top: 15px; width: 100%;">2. Превратить в графику (Draw.io)</button>
            <p style="margin-top: 15px; font-size: 0.9em; color: #666;">
                Нажмите кнопку, чтобы сгенерировать графические блоки из кода. После этого вы сможете редактировать их мышкой в правой панели.
            </p>
        </section>
        <section class="preview-pane">
            <iframe id="drawio-iframe" frameborder="0"></iframe>
        </section>
    </main>
</body>
</html>
